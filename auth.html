<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">

  <div class="bg-white p-8 rounded-2xl shadow w-96">
    <h2 class="text-2xl font-bold mb-6 text-center">Login</h2>

    <input id="username" type="text" placeholder="Username" class="w-full p-3 border rounded mb-4" />
    <input id="password" type="password" placeholder="Password" class="w-full p-3 border rounded mb-4" />

    <button onclick="login()" class="w-full bg-blue-600 text-white py-3 rounded">Login</button>

    <p id="error" class="text-red-500 mt-4 text-center"></p>
  </div>

  <script>
    function login(){
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;

      // Preconfigured user
      if(username === 'admin' && password === 'admin'){
        localStorage.setItem('loggedInUser', username);
        window.location.href = 'index.html';
      } else {
        document.getElementById('error').innerText = 'Invalid credentials';
      }
    }
  </script>

</body>
</html>
